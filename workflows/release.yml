name: Release
permissions: read-all # deny all writes by default

on:
  push:
    branches: [ main ]

concurrency:
  group: release-please
  cancel-in-progress: false # let an in-flight release finish before starting another

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # https://github.com/googleapis/release-please-action/releases/tag/v5.0.0
        with:
          release-type: python
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
    permissions:
      contents: write
      pull-requests: write
